version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "=== Techno OMS Frontend Build ==="
        - echo "Commit: $AWS_COMMIT_ID"
        - echo "Working dir: $(pwd)"
        - ls -la
        - test -d frontend && echo "frontend/ dir OK" || (echo "ERROR: frontend/ not found" && ls -la && exit 1)
        - test -f frontend/index.html && echo "index.html OK ($(wc -c < frontend/index.html) bytes)" || (echo "ERROR: index.html not found" && exit 1)
    build:
      commands:
        - echo "Static HTML - no build needed"
        - ls -la frontend/
    postBuild:
      commands:
        - echo "Build complete"
  artifacts:
    baseDirectory: frontend
    files:
      - "**/*"
  cache:
    paths: []
